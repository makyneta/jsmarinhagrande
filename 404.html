<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — JS Marinha Grande</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root { --red:#C0181A; --red-dark:#8B0F11; --red-light:#E83235; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { min-height:100vh; background:#FDF5F5; font-family:'Outfit',sans-serif; overflow:hidden; display:flex; align-items:center; justify-content:center; }

  .bg { position:fixed; inset:0; z-index:0; overflow:hidden; }
  .bg-grid { position:absolute; inset:0; background-image:linear-gradient(rgba(192,24,26,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(192,24,26,.04) 1px,transparent 1px); background-size:48px 48px; animation:gridSlide 45s linear infinite; }
  @keyframes gridSlide { from{background-position:0 0} to{background-position:48px 48px} }
  .bg-circle { position:absolute; border-radius:50%; border:1.5px solid rgba(192,24,26,.09); animation:bgPulse 7s ease-in-out infinite alternate; }
  .bg-circle:nth-child(1){width:520px;height:520px;top:-160px;left:-160px;}
  .bg-circle:nth-child(2){width:320px;height:320px;top:-80px;left:-80px;border-color:rgba(192,24,26,.06);animation-delay:1s;}
  .bg-circle:nth-child(3){width:700px;height:700px;bottom:-300px;right:-200px;animation-delay:2s;}
  .bg-circle:nth-child(4){width:400px;height:400px;bottom:-180px;right:-100px;border-color:rgba(192,24,26,.05);animation-delay:.5s;}
  @keyframes bgPulse { from{transform:scale(1);opacity:1} to{transform:scale(1.05);opacity:.45} }
  #particles { position:fixed; inset:0; z-index:0; pointer-events:none; }

  .wrap { position:relative; z-index:1; display:flex; flex-direction:column; align-items:center; text-align:center; padding:20px; }

  .logo { width:80px; height:80px; border-radius:50%; overflow:hidden; box-shadow:0 4px 28px rgba(192,24,26,.18),0 0 0 3px rgba(192,24,26,.10); background:white; margin-bottom:28px; animation:logoPop .8s cubic-bezier(.34,1.56,.64,1) .05s both; }
  @keyframes logoPop { 0%{transform:scale(.3);opacity:0} 70%{transform:scale(1.06);opacity:1} 100%{transform:scale(1);opacity:1} }
  .logo img { width:100%; height:100%; object-fit:cover; display:block; }

  .num { font-family:'Playfair Display',serif; font-size:clamp(7rem,28vw,11rem); font-weight:900; color:var(--red-dark); line-height:.9; letter-spacing:-.04em; opacity:0; animation:fadeUp .5s ease .2s forwards; position:relative; }
  .num::after { content:''; position:absolute; bottom:-8px; left:50%; transform:translateX(-50%); height:3px; width:0; background:linear-gradient(90deg,transparent,var(--red),transparent); animation:lineGrow .5s ease .65s forwards; }
  @keyframes lineGrow { to{width:70%} }

  .sub { font-size:.88rem; font-weight:500; color:rgba(139,15,17,.55); letter-spacing:.12em; text-transform:uppercase; margin-top:18px; margin-bottom:32px; opacity:0; animation:fadeUp .5s ease .45s forwards; }

  .home-btn { display:inline-flex; align-items:center; gap:8px; padding:11px 26px; background:var(--red); color:white; border-radius:30px; text-decoration:none; font-size:.85rem; font-weight:600; letter-spacing:.04em; box-shadow:0 6px 22px rgba(192,24,26,.28); transition:transform .22s cubic-bezier(.22,1,.36,1),box-shadow .22s,background .18s; opacity:0; animation:fadeUp .5s ease .6s forwards; }
  .home-btn:hover { transform:translateY(-3px) scale(1.04); box-shadow:0 12px 30px rgba(192,24,26,.35); background:var(--red-dark); }
  .home-btn svg { width:14px; height:14px; }

  @keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>

<canvas id="particles"></canvas>
<div class="bg">
  <div class="bg-grid"></div>
  <div class="bg-circle"></div>
  <div class="bg-circle"></div>
  <div class="bg-circle"></div>
  <div class="bg-circle"></div>
</div>

<div class="wrap">
  <!-- <div class="logo">
    <img src="assets/images/ui/profile.jpg" alt="Juventude Socialista Marinha Grande" onerror="this.style.display='none'">
  </div> -->
  <div class="num">404</div>
  <div class="sub">Página não encontrada</div>
  <a href="index.html" class="home-btn">
    <svg viewBox="0 0 24 24" fill="white"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    Voltar ao início
  </a>
</div>

<script>
// Redirect map — silent, no UI
const ROUTES = {
  '/instagram': 'https://www.instagram.com/js.marinhagrande',
  '/facebook':  'https://www.facebook.com/jsocialistamg',
  '/jsnacional':'https://juventudesocialista.pt',
};

const path = window.location.pathname.toLowerCase().replace(/\/$/, '');
const dest  = ROUTES[path];
if (dest) window.location.replace(dest);

// Particles
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let W, H, pts = [];
function resize(){ W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize(); window.addEventListener('resize', resize);
function mkPt(){ return { x:Math.random()*W, y:Math.random()*H+H, r:Math.random()*2+.5, vy:Math.random()*.5+.15, vx:(Math.random()-.5)*.3, op:Math.random()*.16+.03, ph:Math.random()*Math.PI*2 }; }
for(let i=0;i<36;i++){ const p=mkPt(); p.y=Math.random()*H; pts.push(p); }
(function draw(){
  ctx.clearRect(0,0,W,H);
  pts.forEach(p=>{
    p.ph+=.018; const o=p.op*(0.8+0.2*Math.sin(p.ph));
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(192,24,26,${o})`; ctx.fill();
    p.y-=p.vy; p.x+=p.vx;
    if(p.y<-10) Object.assign(p,mkPt());
  });
  requestAnimationFrame(draw);
})();
</script>
</body>
</html>
